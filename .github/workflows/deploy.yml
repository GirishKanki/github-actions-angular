name: Angular Deploy to Dev Server

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: "22"

  - name: Install dependencies
    run: npm ci

  - name: Build Angular
    run: npm run build -- --configuration=production --base-href=/GitHub-actions/angular/

  - name: Configure SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

  - name: Copy build to server
    run: |
      scp -r dist/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/angular-build

  - name: Deploy on EC2
    run: |
      ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
        sudo mkdir -p /var/www/html/GitHub-actions/angular
        sudo rm -rf /var/www/html/GitHub-actions/angular/*
        sudo cp -r /tmp/angular-build/* /var/www/html/GitHub-actions/angular/
      "
