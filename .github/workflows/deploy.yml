name: Build Angular App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Angular Project
        run: npm run build -- --configuration=production --base-href=/GitHub-actions/angular/
        
      - name: Show Build Folder
        run: |
         echo "Project files:"
         ls
         echo "Dist files:"
         ls -R dist
  
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Build Files to EC2
        run: |
          scp -r dist/github-actions-angular/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/angular-build
          
      - name: Deploy to Web Server
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            sudo rm -rf /var/www/html/GitHub-actions/angular/*
            sudo mv /tmp/angular-build/* /var/www/html/GitHub-actions/angular/
          "
