name: Deploy Angular App to Dev Server

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22

  - name: Install Dependencies
    run: npm install

  - name: Build Angular App
    run: npm run build -- --configuration=production --base-href=/GitHub-actions/angular/

  - name: Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

  - name: Copy Build to EC2
    run: |
      scp -r dist/github-actions-angular/browser/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/angular-build

  - name: Deploy to EC2 Web Directory
    run: |
      ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
        sudo mkdir -p /var/www/html/GitHub-actions/angular
        sudo rm -rf /var/www/html/GitHub-actions/angular/*
        sudo mv /tmp/angular-build/* /var/www/html/GitHub-actions/angular/
      "
```
