name: Angular Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select Branch"
        required: true
        default: "develop"
        type: choice
        options:
          - develop
          - main
        
      env:
        description: "Select Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - india
          - uk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      #  Build based on environment
      - name: Build Angular App
        run: |
          ENV="${{ github.event.inputs.env }}"
          echo "Selected ENV: $ENV"

          case "$ENV" in
             dev)
              CONFIG="development"
              BASE_HREF="/GitHub-actions/angular-dev/"
              ;;
            india)
              CONFIG="india"
              BASE_HREF="/GitHub-actions/angular-india/"
              ;;
            uk)
              CONFIG="uk"
              BASE_HREF="/GitHub-actions/angular-uk/"
              ;;
            *)
              echo "Invalid environment: $ENV"
              exit 1
              ;;
          esac

          echo "Using Angular config: $CONFIG"
          echo "Using Base Href: $BASE_HREF"

          npm run build -- --configuration=$CONFIG --base-href=$BASE_HREF
          

      - name: Show Build Output
        run: |
          echo "Dist files:"
          ls -R dist



      # Setup SSH + Server + Path
      - name: Setup SSH & Env Config
        run: |
          mkdir -p ~/.ssh

          ENV="${{ github.event.inputs.env }}"
          echo "ENV = $ENV"

          if [ "$ENV" = "dev" ]; then
            printf "%s" "${{ secrets.DEV_KEY }}" > ~/.ssh/id_rsa
            HOST="${{ secrets.DEV_HOST }}"
            USER="${{ secrets.DEV_USER }}"
            DEPLOY_PATH="/var/www/html/GitHub-actions/angular-dev"

          elif [ "$ENV" = "india" ]; then
            printf "%s" "${{ secrets.INDIA_KEY }}" > ~/.ssh/id_rsa
            HOST="${{ secrets.INDIA_HOST }}"
            USER="${{ secrets.INDIA_USER }}"
            DEPLOY_PATH="/var/www/html/GitHub-actions/angular-india"

          elif [ "$ENV" = "uk" ]; then
            printf "%s" "${{ secrets.UK_KEY }}" > ~/.ssh/id_rsa
            HOST="${{ secrets.UK_HOST }}"
            USER="${{ secrets.UK_USER }}"
            DEPLOY_PATH="/var/www/html/GitHub-actions/angular-uk"

          else
            echo "Invalid environment: $ENV"
            exit 1
          fi

          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          echo "HOST=$HOST" >> $GITHUB_ENV
          echo "USER=$USER" >> $GITHUB_ENV
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> $GITHUB_ENV


          

      # Stop Apache
      - name: Stop Apache
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST "sudo systemctl stop apache2"


      # Prepare Target Directory (NO DELETE)
      - name: Prepare Target Directory
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST "
            sudo mkdir -p $DEPLOY_PATH
            sudo chown -R $USER:$USER $DEPLOY_PATH
          "


      # Copy Build Files DIRECTLY
      - name: Copy Build Files
        run: |
          scp -r dist/*/browser/* $USER@$HOST:$DEPLOY_PATH/


      # Start Apache
      - name: Start Apache
        run: |
          ssh -o StrictHostKeyChecking=no $USER@$HOST "sudo systemctl start apache2"

          
