name: Angular CI-CD Deploy to Dev Server

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm ci

  - name: Build Angular Application
    run: |
      npm run build -- --configuration=production --base-href=/GitHub-actions/angular/

  - name: Setup SSH Access
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

  - name: Copy Angular Build to EC2
    run: |
      scp -r dist/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/angular-build

  - name: Deploy Build to Web Server
    run: |
      ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
        sudo mkdir -p /var/www/html/GitHub-actions/angular
        sudo rm -rf /var/www/html/GitHub-actions/angular/*
        sudo cp -r /tmp/angular-build/* /var/www/html/GitHub-actions/angular/
      "
```
